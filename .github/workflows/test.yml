name: Test API Doc Generator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -c "from scanner import FlaskScanner, FastAPIScanner, ExpressScanner"
          python -c "from generator import OpenAPIGenerator"
          python -c "from main import detect_framework"
          echo "All imports successful"
